<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yejin Ahn | Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --primary: #6366f1;
      --text: #e5e7eb;
      --sub: #9ca3af;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    header h1 { font-size: 20px; }

    .hero {
      text-align: center;
      padding: 120px 20px 80px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero p {
      color: var(--sub);
      font-size: 18px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card);
      padding: 40px 30px;
      border-radius: 18px;
      border: 1px solid #1f2937;
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    .card p {
      color: var(--sub);
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--sub);
      border-top: 1px solid #1f2937;
      margin-top: 60px;
    }

    @media (max-width: 600px) {
      .hero h2 { font-size: 28px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Hello, Welcome to yezzzn space</h1>
</header>

<section class="hero">
  <h2>Who is yezzzn</h2>
  <p>Yejin Ahn, this is my self-development space </p>
</section>

<div class="container">

  <div class="grid">

    <a href="portfolio/portfolio.html" style="text-decoration:none; color:inherit;">
      <div class="card">
        <h3>Portfolio</h3>
        <p>프로젝트 경험 및 기술 정리</p>
        <span class="btn">바로가기</span>
      </div>
    </a>

    <a href="portfolio/career/about.html" style="text-decoration:none; color:inherit;">
      <div class="card">
        <h3>About Me</h3>
        <p>경력 및 이력 상세</p>
        <span class="btn">바로가기</span>
      </div>
    </a>

    <a href="study/study.html" style="text-decoration:none; color:inherit;">
      <div class="card">
        <h3>Study</h3>
        <p>기술 스터디 및 학습 기록</p>
        <span class="btn">바로가기</span>
      </div>
    </a>

  </div>

</div>

<footer>
  <p>© 2026 yezzzn</p>
</footer>

</body>
</html>
